# Minimal config to trigger the c16 timeout for diagnostics.
# Only produces 2 runs: in128-out64 at c8 (control) and c16 (trigger).

model: "meta-llama/Meta-Llama-3.1-8B-Instruct"

checkpoints:
  awq_marlin: "hugging-quants/Meta-Llama-3.1-8B-Instruct-AWQ-INT4"

server:
  quantization: [awq_marlin]
  max_model_len: [1024]
  gpu_memory_utilization: [0.85]

workload:
  concurrency: [8, 16]
  input_len: [128]
  output_len: [64]
  num_prompts: 100
  num_warmups: 5

bench:
  request_rate: inf
  metric_percentiles: "50,90,95,99"
  benchmark_timeout: 1800

serve:
  host: "127.0.0.1"
  port: 8000
  startup_timeout: 300
